apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: spring-petclinic
stringData:
  MYSQL_ROOT_PASSWORD: changeme
  MYSQL_DATABASE: petclinic
  MYSQL_USER: petclinic
  MYSQL_PASSWORD: changeme
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: spring-petclinic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: spring-petclinic
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pdb-mysql
  namespace: spring-petclinic
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
---
apiVersion: v1
kind: Secret
metadata:
  name: pdb-mysql
  namespace: spring-petclinic
stringData:
  mysql-root-password: changeme
  mysql-password: changeme
